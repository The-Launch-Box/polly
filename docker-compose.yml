services:
  postgres:
    image: postgres:16
    container_name: typeform-alt-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: typeform
      POSTGRES_PASSWORD: typeform
      POSTGRES_DB: typeform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U typeform -d typeform"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
