[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
preDeployCommand = "npx prisma migrate deploy && npx prisma db seed"
# Use next start (same as working Nixpacks deploy) so AUTH_* runtime env is visible.
startCommand = "npx next start --hostname 0.0.0.0"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
